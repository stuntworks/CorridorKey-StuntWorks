<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CorridorKey StuntWorks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #232323;
            color: #e0e0e0;
            padding: 15px;
            font-size: 12px;
            overflow-y: auto;
        }
        h1 {
            color: #4CAF50;
            font-size: 16px;
            text-align: center;
            margin-bottom: 2px;
        }
        .credit {
            text-align: center;
            font-size: 9px;
            color: #777;
            margin-bottom: 12px;
        }
        .credit a { color: #999; text-decoration: none; }
        .credit a:hover { color: #4CAF50; }
        .section {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        input[type="range"] {
            padding: 0;
            height: 20px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-row input {
            flex: 1;
        }
        .slider-value {
            width: 40px;
            text-align: right;
            color: #4CAF50;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-process {
            background: #4CAF50;
            color: white;
        }
        .btn-process:hover { background: #45a049; }
        .btn-preview {
            background: #9C27B0;
            color: white;
        }
        .btn-preview:hover { background: #7B1FA2; }
        .btn-batch {
            background: #2196F3;
            color: white;
        }
        .btn-batch:hover { background: #1976D2; }
        #preview-container {
            margin-top: 10px;
            text-align: center;
            background: #1a1a1a;
            border-radius: 4px;
            min-height: 40px;
            overflow: hidden;
        }
        #preview-container img {
            width: 48%;
            display: inline-block;
            border-radius: 4px;
            margin: 1%;
        }
        #preview-label {
            color: #666;
            font-size: 10px;
            padding: 12px;
        }
        #status {
            text-align: center;
            padding: 8px;
            margin-top: 8px;
            background: #1a1a1a;
            border-radius: 4px;
            color: #0ff;
            font-weight: bold;
            font-size: 11px;
        }
        #log {
            background: #111;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            margin-top: 8px;
            height: 60px;
            overflow-y: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>CorridorKey StuntWorks</h1>
    <div class="credit">
        AI Keyer by <a href="#" onclick="openURL('https://github.com/nikopueringer/CorridorKey')">Niko Pueringer / Corridor Digital</a><br>
        Plugin by Roberto Lopez / <a href="#" onclick="openURL('https://www.youtube.com/@stuntworksactioncinema')">StuntWorks Action Cinema</a>
    </div>

    <div id="preview-container">
        <span id="preview-label">Preview will appear here</span>
    </div>

    <div class="section">
        <label>Screen Type</label>
        <select id="screenType">
            <option value="green">Green Screen</option>
            <option value="blue">Blue Screen</option>
        </select>
    </div>

    <div class="section">
        <label>Despill</label>
        <div class="slider-row">
            <input type="range" id="despill" min="0" max="100" value="50">
            <span class="slider-value" id="despillVal">0.50</span>
        </div>
    </div>

    <div class="section">
        <label>Edge Refiner</label>
        <div class="slider-row">
            <input type="range" id="refiner" min="0" max="100" value="100">
            <span class="slider-value" id="refinerVal">1.00</span>
        </div>
    </div>

    <div class="checkbox-row">
        <input type="checkbox" id="despeckle" checked>
        <label for="despeckle" style="margin:0">Auto Despeckle</label>
        <input type="number" id="despeckleSize" value="400" min="50" max="2000" style="width:60px">
        <span>px</span>
    </div>

    <div class="section">
        <label>Output Folder</label>
        <div style="display:flex;gap:5px;">
            <input type="text" id="outputPath" readonly style="flex:1;padding:6px;background:#333;border:1px solid #444;color:#fff;border-radius:4px;font-size:11px;">
            <button onclick="browseOutput()" style="width:auto;padding:6px 12px;margin:0;background:#555;font-size:11px;">Browse</button>
        </div>
    </div>

    <button class="btn-preview" onclick="processFrame(true)">PREVIEW FRAME</button>
    <button class="btn-process" onclick="processFrame(false)">PROCESS FRAME</button>
    <button class="btn-batch" onclick="processWorkArea()">PROCESS WORK AREA</button>

    <div id="status">Ready</div>
    <div id="log"></div>

    <script src="./js/CSInterface.js"></script>
    <script>
        const cs = new CSInterface();
        const cp = require('child_process');
        const path = require('path');
        const fs = require('fs');
        const os = require('os');

        var lastOutputPath = null;
        var hostApp = 'ae';

        // Read CorridorKey root from config
        var ckRoot = '';
        var configPath = path.join(__dirname, 'corridorkey_path.txt');
        try {
            ckRoot = fs.readFileSync(configPath, 'utf8').trim();
        } catch(e) {
            ckRoot = 'D:\\New AI Projects\\CorridorKey';
        }
        var pythonExe = path.join(ckRoot, '.venv', 'Scripts', 'pythonw.exe');
        var processorScript = path.join(ckRoot, 'ae_plugin', 'ae_processor.py');

        function openURL(url) {
            cs.openURLInDefaultBrowser(url);
        }

        const OUTPUT_KEY = 'ck_output_path';

        var savedOutput = localStorage.getItem(OUTPUT_KEY);
        if (!savedOutput) {
            savedOutput = os.homedir().replace(/\\/g, '/') + '/Documents/CorridorKey';
        }
        document.getElementById('outputPath').value = savedOutput;

        function browseOutput() {
            var cepResult = window.cep && window.cep.fs && window.cep.fs.showOpenDialogEx
                ? window.cep.fs.showOpenDialogEx(false, true, 'Choose Output Folder', savedOutput)
                : null;
            if (cepResult && cepResult.data && cepResult.data.length > 0) {
                savedOutput = cepResult.data[0].replace(/\\/g, '/');
                document.getElementById('outputPath').value = savedOutput;
                localStorage.setItem(OUTPUT_KEY, savedOutput);
                log('Output folder: ' + savedOutput);
            }
        }

        document.getElementById('despill').oninput = function() {
            document.getElementById('despillVal').textContent = (this.value / 100).toFixed(2);
        };
        document.getElementById('refiner').oninput = function() {
            document.getElementById('refinerVal').textContent = (this.value / 100).toFixed(2);
        };

        function log(msg) {
            const el = document.getElementById('log');
            el.innerHTML += msg + '<br>';
            el.scrollTop = el.scrollHeight;
        }

        function status(msg) {
            document.getElementById('status').textContent = msg;
        }

        function showPreview(filePath) {
            const container = document.getElementById('preview-container');
            const ts = Date.now();
            const fileUri = 'file:///' + filePath.replace(/\\/g, '/');
            const matteUri = 'file:///' + filePath.replace(/\\/g, '/').replace('.png', '_matte.png');
            container.innerHTML = '<img src="' + fileUri + '?' + ts + '" alt="Keyed" title="Keyed Result">' +
                                  '<img src="' + matteUri + '?' + ts + '" alt="Matte" title="Alpha Matte">';
        }

        function getSettings() {
            return {
                screenType: document.getElementById('screenType').value,
                despill: document.getElementById('despill').value / 100,
                refiner: document.getElementById('refiner').value / 100,
                despeckle: document.getElementById('despeckle').checked,
                despeckleSize: document.getElementById('despeckleSize').value
            };
        }

        // Build Python args for single frame processing
        function buildProcessArgs(inputPath, outputPath, settings) {
            return [processorScript, 'single', inputPath, outputPath,
                '--screen', settings.screenType || 'green',
                '--despill', String(settings.despill || 0.5),
                '--refiner', String(settings.refiner || 1.0),
                '--despeckle', settings.despeckle ? '1' : '0',
                '--despeckle-size', String(settings.despeckleSize || 400)];
        }

        // Run Python via Node.js child_process (works in both AE and Premiere)
        function runPython(args) {
            return cp.execFileSync(pythonExe, args, {timeout: 300000, encoding: 'utf8'});
        }

        // ── Premiere Pro: panel-side Python execution ──

        function ppro_processFrame(previewOnly) {
            status('Processing...');
            log('Getting clip info...');

            cs.evalScript('ppro_getClipInfo()', function(resultJson) {
                try {
                    var info = JSON.parse(resultJson);
                    if (info.error) {
                        status('Error');
                        log('Error: ' + info.error);
                        return;
                    }

                    var pid = Math.floor(Math.random() * 100000);
                    var tmpDir = os.tmpdir();
                    var inputPath = path.join(tmpDir, 'ck_ppro_in_' + pid + '.png');
                    var outputPath = path.join(tmpDir, 'ck_ppro_out_' + pid + '.png');

                    log('Extracting frame ' + info.sourceFrame + '...');

                    // Extract frame via Python/OpenCV
                    var extractCode = "import cv2; " +
                        "cap = cv2.VideoCapture(r'" + info.sourcePath.replace(/'/g, "\\'") + "'); " +
                        "cap.set(cv2.CAP_PROP_POS_FRAMES, " + info.sourceFrame + "); " +
                        "ret, frame = cap.read(); cap.release(); " +
                        "cv2.imwrite(r'" + inputPath.replace(/'/g, "\\'") + "', frame) if ret else exit(1)";

                    try {
                        cp.execFileSync(pythonExe, ['-c', extractCode], {timeout: 30000});
                    } catch(e) {
                        status('Error');
                        log('Error: Could not extract frame');
                        return;
                    }

                    if (!fs.existsSync(inputPath)) {
                        status('Error');
                        log('Error: Frame extraction produced no output');
                        return;
                    }

                    // Process through CorridorKey
                    log('Running CorridorKey...');
                    var settings = getSettings();
                    var args = buildProcessArgs(inputPath, outputPath, settings);

                    try {
                        runPython(args);
                    } catch(e) {
                        status('Error');
                        var errMsg = e.stderr || e.stdout || e.message || 'Unknown error';
                        log('Error: ' + errMsg);
                        return;
                    }

                    if (!fs.existsSync(outputPath)) {
                        status('Error');
                        log('Error: No output produced');
                        return;
                    }

                    // Show preview
                    showPreview(outputPath);

                    if (!previewOnly) {
                        // Import into Premiere via ExtendScript
                        var escapedPath = outputPath.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                        cs.evalScript("ppro_importFile('" + escapedPath + "')", function(importResult) {
                            if (importResult && importResult.indexOf('success') === 0) {
                                status('Done!');
                                log('Frame processed and imported');
                            } else {
                                // Processing worked, import is secondary
                                status('Done!');
                                log('Frame keyed! Output: ' + outputPath);
                                log('(Auto-import not available — drag from: ' + outputPath + ')');
                            }
                        });
                    } else {
                        status('Done!');
                        log('Preview ready');
                    }

                    // Cleanup input
                    try { fs.unlinkSync(inputPath); } catch(e) {}

                } catch(e) {
                    status('Error');
                    log('Error: ' + e.message);
                }
            });
        }

        function ppro_processWorkArea() {
            status('Processing work area...');
            log('Getting clip info...');

            cs.evalScript('ppro_getWorkAreaInfo()', function(resultJson) {
                try {
                    var info = JSON.parse(resultJson);
                    if (info.error) {
                        status('Error');
                        log('Error: ' + info.error);
                        return;
                    }

                    var pid = Math.floor(Math.random() * 100000);
                    var tmpDir = os.tmpdir();
                    var outputFolder = path.join(tmpDir, 'ck_ppro_seq_' + pid);
                    fs.mkdirSync(outputFolder, {recursive: true});

                    var totalFrames = info.endFrame - info.startFrame;
                    log('Batch: ' + totalFrames + ' frames (' + info.startFrame + '-' + info.endFrame + ')');
                    status('Processing ' + totalFrames + ' frames...');

                    var settings = getSettings();
                    var args = [processorScript, 'batch',
                        info.sourcePath, outputFolder,
                        '--start-frame', String(info.startFrame),
                        '--end-frame', String(info.endFrame),
                        '--fps', String(info.fps),
                        '--screen', settings.screenType || 'green',
                        '--despill', String(settings.despill || 0.5),
                        '--despeckle', settings.despeckle ? '1' : '0',
                        '--despeckle-size', String(settings.despeckleSize || 400),
                        '--refiner', String(settings.refiner || 1.0)];

                    try {
                        runPython(args);
                    } catch(e) {
                        status('Error');
                        log('Error: Batch processing failed - ' + e.message);
                        return;
                    }

                    // Read result
                    var resultPath = path.join(outputFolder, 'batch_result.txt');
                    var processed = 0;
                    try {
                        var txt = fs.readFileSync(resultPath, 'utf8');
                        processed = parseInt(txt.split(',')[0], 10);
                    } catch(e) {}

                    if (processed === 0) {
                        status('Error');
                        log('Error: No frames produced');
                        return;
                    }

                    // Import sequence into Premiere
                    var escapedFolder = outputFolder.replace(/\\/g, '\\\\');
                    cs.evalScript("ppro_importSequence('" + escapedFolder + "')", function(importResult) {
                        if (importResult === 'success') {
                            status('Done!');
                            log('Batch complete: ' + processed + '/' + totalFrames + ' frames');
                        } else {
                            status('Done (import issue)');
                            log('Processed but: ' + importResult);
                        }
                    });

                } catch(e) {
                    status('Error');
                    log('Error: ' + e.message);
                }
            });
        }

        // ── Unified handlers — route to AE or Premiere ──

        function processFrame(previewOnly) {
            if (hostApp === 'ppro') {
                ppro_processFrame(previewOnly);
                return;
            }

            // AE path — uses ExtendScript system.callSystem
            status('Processing...');
            log('Starting process...');

            const settings = getSettings();
            const settingsJson = JSON.stringify(settings).replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            cs.evalScript("processCurrentFrame('" + settingsJson + "', " + previewOnly + ")", function(result) {
                if (result && result.indexOf('success:') === 0) {
                    status('Done!');
                    log('Frame processed successfully');
                    var outputPath = result.replace('success:', '');
                    if (outputPath) {
                        showPreview(outputPath);
                        lastOutputPath = outputPath;
                    }
                } else if (result === 'success') {
                    status('Done!');
                    log('Frame processed successfully');
                } else {
                    status('Error');
                    log('Error: ' + result);
                }
            });
        }

        function processWorkArea() {
            if (hostApp === 'ppro') {
                ppro_processWorkArea();
                return;
            }

            // AE path
            status('Processing work area...');
            log('Starting batch process...');

            const settings = getSettings();
            const settingsJson = JSON.stringify(settings).replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            cs.evalScript("processWorkArea('" + settingsJson + "')", function(result) {
                if (result && result.startsWith && result.startsWith('success')) {
                    status('Done!');
                    log(result);
                } else {
                    status('Error');
                    log('Error: ' + result);
                }
            });
        }

        // Detect host app and update UI
        cs.evalScript('getHostApp()', function(host) {
            hostApp = host;
            if (host === 'ppro') {
                log('CorridorKey Panel Ready (Premiere Pro)');
                document.querySelector('.btn-batch').textContent = 'PROCESS IN/OUT RANGE';
            } else {
                log('CorridorKey Panel Ready (After Effects)');
            }
        });
    </script>
</body>
</html>
