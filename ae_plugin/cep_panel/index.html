<!DOCTYPE html>
<!-- Last modified: 2026-04-14 | Change: Phase 4 — live-preview viewer integration.
     PREVIEW FRAME now runs the `cache` subcommand + spawns preview_viewer.py in
     --persistent mode. Sliders debounce 50ms and write JSON lines to viewer
     stdin for real-time stage-2 re-render. Commit path (KEY CURRENT FRAME,
     PROCESS WORK AREA) untouched — frame alignment stays safe. -->
<html>
<head>
    <meta charset="UTF-8">
    <title>CorridorKey StuntWorks</title>
    <style>
        /* ── CorridorKey StuntWorks — Honeycomb Theme ─────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #000 0%, #001 100%);
            color: #e8e8e8; padding: 10px 8px; font-size: 12px; overflow-y: auto;
        }
        h1 {
            color: #0ff; font-size: 14px; text-align: center;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 2px; font-weight: 700;
            text-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        .credit { text-align: center; font-size: 9px; color: #bcc; margin-bottom: 8px; }
        .credit a { color: #dff; text-decoration: none; }
        .credit a:hover { color: #0ff; }
        .section {
            margin-bottom: 12px; padding-bottom: 6px;
            border-bottom: 1px solid rgba(0,255,255,0.06);
        }
        label {
            display: block; margin-bottom: 4px; color: #0ff;
            font-size: 10px; font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase;
        }
        select {
            width: 100%; padding: 7px 10px; background: rgba(0,20,40,0.6);
            border: 1px solid rgba(0,255,255,0.15); color: #e8e8e8; border-radius: 4px;
            font-size: 10px; outline: none; transition: border-color 0.2s;
        }
        select:focus { border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.2); }

        /* ── Sliders — precision instrument look ───────────────────── */
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 20px; background: transparent;
            margin: 2px 0; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 4px; border-radius: 2px;
            background: linear-gradient(to right, #0ff 0%, #0ff var(--fill, 50%), rgba(0,20,40,0.5) var(--fill, 50%), rgba(0,20,40,0.5) 100%);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: #000; border: 2px solid #0ff;
            margin-top: -6px;
            box-shadow: 0 0 8px rgba(0,255,255,0.4), 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.12s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s;
        }
        input[type="range"]:hover::-webkit-slider-thumb {
            transform: scale(1.25);
            box-shadow: 0 0 12px rgba(0,255,255,0.5), 0 4px 12px rgba(0,0,0,0.5);
        }
        input[type="range"]:active::-webkit-slider-thumb {
            box-shadow: 0 0 16px rgba(0,255,255,0.6), 0 4px 12px rgba(0,0,0,0.6);
        }
        .slider-row { display: flex; align-items: center; gap: 6px; }
        .slider-row input { flex: 1; }
        .slider-value {
            width: 36px; text-align: right; color: #0ff;
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            font-size: 11px; font-weight: 500;
        }
        .checkbox-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }

        /* ── Buttons — clear clickable controls ───────────────────── */
        button {
            width: 100%; padding: 10px; margin: 4px 0;
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        button:hover:enabled {
            transform: translateY(-1px);
            filter: brightness(1.2);
        }
        button:active:enabled {
            transform: translateY(1px);
        }
        button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ── Button working state — bold static change ──────────────
             CEP's Chromium does NOT animate during spawnSync, even on the
             compositor thread. So we use a dramatic static color inversion
             instead of animation. The user sees a clear state change. ── */
        button.btn-working {
            background: linear-gradient(135deg, #0ff, #0ad) !important;
            color: #000 !important;
            border: 1px solid #0ff !important;
            box-shadow: 0 0 20px rgba(0,255,255,0.5) !important;
            opacity: 1 !important;
            cursor: wait !important;
            pointer-events: none;
            font-weight: 900 !important;
            letter-spacing: 2px !important;
        }

        /* ── Button error flash — red pulse then fades back ────────── */
        .btn-error {
            background: rgba(255,60,0,0.25) !important;
            color: #FF3D00 !important; border: 1px solid rgba(255,60,0,0.5) !important;
            opacity: 1 !important;
            animation: btn-error-flash 0.4s ease-in-out 3;
        }
        @keyframes btn-error-flash {
            0%, 100% { background-color: rgba(255,60,0,0.1); }
            50%      { background-color: rgba(255,60,0,0.35); }
        }

        .btn-preview {
            background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(0,200,255,0.15));
            color: #0ff; border: 1px solid rgba(0,255,255,0.3);
            box-shadow: 0 2px 8px rgba(0,255,255,0.15);
        }
        .btn-preview:hover:enabled {
            background: linear-gradient(135deg, rgba(0,255,255,0.35), rgba(0,200,255,0.25));
            box-shadow: 0 4px 16px rgba(0,255,255,0.25);
        }
        .btn-process {
            background: linear-gradient(135deg, rgba(0,255,100,0.25), rgba(0,200,80,0.2));
            color: #0f8; border: 1px solid rgba(0,255,100,0.3);
            box-shadow: 0 2px 8px rgba(0,255,100,0.15);
        }
        .btn-process:hover:enabled {
            background: linear-gradient(135deg, rgba(0,255,100,0.4), rgba(0,200,80,0.3));
            box-shadow: 0 4px 16px rgba(0,255,100,0.25);
        }
        .btn-batch {
            background: linear-gradient(135deg, rgba(255,150,0,0.2), rgba(255,100,0,0.15));
            color: #fa0; border: 1px solid rgba(255,150,0,0.3);
            box-shadow: 0 2px 8px rgba(255,150,0,0.15);
        }
        .btn-batch:hover:enabled {
            background: linear-gradient(135deg, rgba(255,150,0,0.35), rgba(255,100,0,0.25));
            box-shadow: 0 4px 16px rgba(255,150,0,0.25);
        }

        /* ── Preview container ─────────────────────────────────────── */
        #preview-container {
            margin-top: 6px; text-align: center; background: rgba(0,20,40,0.3);
            border-radius: 6px; min-height: 30px; overflow: hidden;
            border: 1px solid rgba(0,255,255,0.06); padding: 4px;
        }
        #preview-container img { width: 48%; display: inline-block; border-radius: 2px; margin: 1%; }
        #preview-label { color: #444; font-size: 9px; padding: 10px; }

        /* ── Status bar ────────────────────────────────────────────── */
        #status {
            text-align: center; padding: 5px; margin-top: 6px;
            background: rgba(0,255,255,0.05); border: 1px solid rgba(0,255,255,0.1);
            border-radius: 4px; color: #0ff; font-weight: 600;
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            font-size: 8px; letter-spacing: 0.5px;
        }

        /* ── Progress bar ──────────────────────────────────────────── */
        #progress-bar {
            margin-top: 4px; height: 3px; background: rgba(0,20,40,0.5);
            border-radius: 2px; overflow: hidden; display: none; position: relative;
        }
        #progress-fill { height: 100%; width: 0%; background: #0ff; transition: width 0.2s; }
        #progress-bar.indeterminate #progress-fill { display: none; }
        #progress-bar.indeterminate::before {
            content: ''; position: absolute; top: 0; left: -40%; height: 100%; width: 40%;
            background: linear-gradient(90deg, transparent, #0ff, transparent);
            animation: ck-indeterminate 1.2s infinite linear;
        }
        @keyframes ck-indeterminate {
            0%   { left: -40%; }
            100% { left: 100%; }
        }

        /* ── Log ───────────────────────────────────────────────────── */
        #log {
            background: rgba(0,10,20,0.8); color: #0ff;
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            font-size: 8px; padding: 6px; margin-top: 4px;
            height: 54px; overflow-y: auto; border-radius: 4px;
            border: 1px solid #1e1e1e;
        }
        .log-err { color: #FF3D00; }
    </style>

<body>
    <h1>CorridorKey StuntWorks</h1>
    <div class="credit">
        AI Keyer by <a href="#" onclick="openURL('https://github.com/nikopueringer/CorridorKey')">Niko Pueringer / Corridor Digital</a><br>
        Plugin by Roberto Lopez / <a href="#" onclick="openURL('https://www.youtube.com/@stuntworksactioncinema')">StuntWorks Action Cinema</a>
    </div>

    <div class="section">
        <label>Screen</label>
        <select id="screenType">
            <option value="green">Green Screen</option>
            <option value="blue">Blue Screen</option>
        </select>
    </div>

    <div class="section">
        <label>Despill</label>
        <div class="slider-row">
            <input type="range" id="despill" min="0" max="100" value="50">
            <span class="slider-value" id="despillVal">0.50</span>
        </div>
    </div>

    <div class="section">
        <label>Refiner</label>
        <div class="slider-row">
            <input type="range" id="refiner" min="0" max="100" value="100">
            <span class="slider-value" id="refinerVal">1.00</span>
        </div>
    </div>

    <div class="section">
        <div class="checkbox-row" style="margin-bottom:5px;">
            <input type="checkbox" id="despeckle" checked>
            <label for="despeckle" style="margin:0">Despeckle</label>
        </div>
        <div class="slider-row">
            <input type="range" id="despeckleSize" min="50" max="2000" value="400">
            <span class="slider-value" id="despeckleSizeVal">400</span>
        </div>
    </div>

    <div class="section">
        <label>Output</label>
        <div style="display:flex;gap:5px;">
            <input type="text" id="outputPath" readonly style="flex:1;padding:6px;background:#333;border:1px solid #444;color:#fff;border-radius:4px;font-size:11px;">
            <button onclick="browseOutput()" style="width:auto;padding:6px 12px;margin:0;background:#555;font-size:11px;">Browse</button>
        </div>
    </div>

    <button id="btn-preview" class="btn-preview" onclick="previewFrameLive()">PREVIEW FRAME (LIVE)</button>
    <button id="btn-process" class="btn-process" onclick="processFrame(false)">KEY CURRENT FRAME</button>
    <button id="btn-batch"   class="btn-batch"   onclick="processBatch()">PROCESS WORK AREA</button>

    <div id="status">Ready</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="log"></div>

    <script src="./js/CSInterface.js"></script>
    <script>
/* ============================================================
   CorridorKey — Panel Controller
   Last modified: 2026-04-14 | Change: Node.js-side Python exec, crypto-random temp
      names, real log file, settings via JSON file.

   WHAT THIS CODE DOES:
   1. Reads timeline state from ExtendScript (host.jsx returns JSON strings).
   2. Writes settings to a temp JSON file using Node.js fs.
   3. Spawns ae_processor.py via child_process.execFileSync with an argv array —
      arguments never touch a shell, so shell-injection is architecturally impossible.
   4. On success, calls back into ExtendScript to import the result onto the timeline.
   5. Writes a plain-text log of everything to %TEMP%\corridorkey.log for support.

   DEPENDS-ON: CEP panel with --enable-nodejs --mixed-context (set in manifest.xml).
               Node.js modules: child_process, fs, path, os, crypto.
               host.jsx functions that return JSON-serialized state.
   AFFECTS: Filesystem (temp JSON + output PNG), timeline (via host.jsx).
   ============================================================ */

const cs = new CSInterface();

// Node.js modules loaded via CEP's mixed-context (not browser require — Node require).
const childProcess = require('child_process');
const fs   = require('fs');
const path = require('path');
const os   = require('os');
const crypto = require('crypto');

// ── Path discovery ──────────────────────────────────────────
// The panel folder inside the Adobe CEP extensions dir. When installed it is:
//   Windows: %APPDATA%\Adobe\CEP\extensions\com.corridorkey.panel
//   macOS:   ~/Library/Application Support/Adobe/CEP/extensions/com.corridorkey.panel
const PANEL_DIR = path.dirname(decodeURIComponent(window.location.pathname).replace(/^\//, ''));

// WHAT IT DOES: Resolves the CorridorKey engine root the same way the Resolve plugin does:
//   env var → corridorkey_path.txt → sibling CorridorKey folder → legacy D: fallback → ~.
function findCorridorkeyRoot() {
    const candidates = [];
    if (process.env.CORRIDORKEY_ROOT) candidates.push(process.env.CORRIDORKEY_ROOT);
    const configPaths = [
        path.join(PANEL_DIR, 'corridorkey_path.txt'),
        path.join(PANEL_DIR, '..', 'corridorkey_path.txt')
    ];
    for (const cp of configPaths) {
        try { if (fs.existsSync(cp)) candidates.push(fs.readFileSync(cp, 'utf8').trim()); } catch (_) {}
    }
    candidates.push(path.resolve(PANEL_DIR, '..', '..', 'CorridorKey'));
    candidates.push('D:\\New AI Projects\\CorridorKey');
    candidates.push(path.join(os.homedir(), 'CorridorKey'));
    for (const p of candidates) {
        if (!p) continue;
        const venv = path.join(p, '.venv');
        if (fs.existsSync(p) && fs.existsSync(venv)) return p;
    }
    throw new Error('CorridorKey engine not found. Tried:\n  ' + candidates.join('\n  ') +
        '\n\nFix: set CORRIDORKEY_ROOT env var or drop corridorkey_path.txt in the panel folder.');
}

// WHAT IT DOES: Returns the Python executable inside the engine venv (Win or Unix layout).
function findPythonExe(ckRoot) {
    if (process.platform === 'win32') return path.join(ckRoot, '.venv', 'Scripts', 'python.exe');
    return path.join(ckRoot, '.venv', 'bin', 'python');
}

// ── Logging ─────────────────────────────────────────────────
const LOG_PATH = path.join(os.tmpdir(), 'corridorkey.log');

// WHAT IT DOES: Writes one line to both the panel UI and the persistent log file.
//   If file logging fails (unlikely), drop silently — we never want logging to crash the panel.
function logLine(msg, isErr) {
    try {
        const ts = new Date().toISOString();
        fs.appendFileSync(LOG_PATH, `[${ts}] ${msg}\n`);
    } catch (_) {}
    const el = document.getElementById('log');
    const span = document.createElement('div');
    if (isErr) span.className = 'log-err';
    span.textContent = msg;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
}

function status(msg) { document.getElementById('status').textContent = msg; }

// WHAT IT DOES: Toggles busy state. The preview button itself becomes an
//   animated progress bar so the user sees activity on the control they clicked.
//   Other buttons just disable. Old separate progress bar kept for batch %.
function setBusy(busy, source) {
    const previewBtn = document.getElementById('btn-preview');
    // Disable process + batch buttons normally. Preview button stays enabled
    // but gets pointer-events:none via .btn-working so the animation runs.
    // (:disabled kills CSS animations in Chromium.)
    document.getElementById('btn-process').disabled = busy;
    document.getElementById('btn-batch').disabled = busy;
    if (busy) {
        previewBtn.disabled = false;  // keep enabled so animation works
        previewBtn.classList.add('btn-working');
        previewBtn._savedText = previewBtn.textContent;
        previewBtn.textContent = source === 'batch' ? 'PROCESSING... PLEASE WAIT' : 'LOADING... PLEASE WAIT';
    } else {
        previewBtn.classList.remove('btn-working');
        previewBtn.disabled = false;
        if (previewBtn._savedText) previewBtn.textContent = previewBtn._savedText;
    }
    document.getElementById('progress-bar').style.display = busy ? 'block' : 'none';
    if (!busy) document.getElementById('progress-fill').style.width = '0%';
}

function setProgress(pct) {
    document.getElementById('progress-fill').style.width = Math.max(0, Math.min(100, pct)) + '%';
}

// WHAT IT DOES: Flashes a button red with an error message, then restores it
//   after 3 seconds. Tells the user what went wrong on the thing they clicked.
// DEPENDS-ON: .btn-error CSS class.
// AFFECTS: button text + class, temporarily.
function flashButtonError(btnId, msg) {
    const btn = document.getElementById(btnId);
    const saved = btn.textContent;
    btn.textContent = msg;
    btn.classList.add('btn-error');
    btn.disabled = false;  // re-enable so it's visible (disabled = 35% opacity)
    setTimeout(() => {
        btn.classList.remove('btn-error');
        btn.textContent = saved;
    }, 3000);
}

function openURL(url) { cs.openURLInDefaultBrowser(url); }

// ── Output path ─────────────────────────────────────────────
const OUTPUT_KEY = 'ck_output_path';
let savedOutput = localStorage.getItem(OUTPUT_KEY) ||
    path.join(os.homedir(), 'Documents', 'CorridorKey');
document.getElementById('outputPath').value = savedOutput;

function browseOutput() {
    const dlg = window.cep && window.cep.fs && window.cep.fs.showOpenDialogEx
        ? window.cep.fs.showOpenDialogEx(false, true, 'Choose Output Folder', savedOutput)
        : null;
    if (dlg && dlg.data && dlg.data.length > 0) {
        savedOutput = dlg.data[0];
        document.getElementById('outputPath').value = savedOutput;
        localStorage.setItem(OUTPUT_KEY, savedOutput);
        logLine('Output folder: ' + savedOutput);
    }
}

// ── UI ──────────────────────────────────────────────────────
// WHAT IT DOES: Updates the CSS --fill custom property on a range input so the
//   green fill track visually tracks the thumb position. Called on every input.
function updateSliderFill(el) {
    const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
    el.style.setProperty('--fill', pct + '%');
}
// Set initial fill on all sliders at startup
document.querySelectorAll('input[type="range"]').forEach(updateSliderFill);

document.getElementById('despill').oninput = function() {
    document.getElementById('despillVal').textContent = (this.value / 100).toFixed(2);
    updateSliderFill(this);
    scheduleViewerUpdate();
};
document.getElementById('refiner').oninput = function() {
    document.getElementById('refinerVal').textContent = (this.value / 100).toFixed(2);
    updateSliderFill(this);
};
document.getElementById('refiner').onchange = function() {
    rekeyWithCurrentSettings();
};
document.getElementById('despeckleSize').oninput = function() {
    document.getElementById('despeckleSizeVal').textContent = this.value;
    updateSliderFill(this);
    scheduleViewerUpdate();
};
// Despeckle — standard feature-toggle pattern. Checked = feature ON, slider
// active (user picks size). Unchecked = feature OFF, slider greyed (no effect).
// Earlier "Auto Despeckle" naming was ambiguous; dropped the "Auto" prefix so
// the toggle means what it says.
document.getElementById('despeckle').onchange = function() {
    const on = this.checked;
    const slider = document.getElementById('despeckleSize');
    slider.disabled = !on;
    slider.style.opacity = on ? '1' : '0.4';
    document.getElementById('despeckleSizeVal').style.opacity = on ? '1' : '0.4';
    scheduleViewerUpdate();
};

// WHAT IT DOES: Collects the current UI state into a plain settings object.
//   Validated here — Python receives the sanitized object via a JSON file.
function getSettings() {
    const despill = parseFloat(document.getElementById('despill').value) / 100;
    const refiner = parseFloat(document.getElementById('refiner').value) / 100;
    const despeckleSize = parseInt(document.getElementById('despeckleSize').value, 10);
    return {
        screenType: document.getElementById('screenType').value === 'blue' ? 'blue' : 'green',
        despill: isFinite(despill) && despill >= 0 && despill <= 1 ? despill : 0.5,
        refiner: isFinite(refiner) && refiner >= 0 && refiner <= 1 ? refiner : 1.0,
        despeckle: document.getElementById('despeckle').checked,
        despeckleSize: isFinite(despeckleSize) && despeckleSize >= 50 && despeckleSize <= 2000 ? despeckleSize : 400
    };
}

// WHAT IT DOES: Builds a crypto-random temp path. Avoids PID-based names that a local
//   attacker could pre-create as symlinks to overwrite arbitrary files.
function randomTempPath(prefix, ext) {
    const id = crypto.randomBytes(12).toString('hex');
    return path.join(os.tmpdir(), `ck_${prefix}_${id}${ext || ''}`);
}

// WHAT IT DOES: Writes a JSON file with the run parameters and returns its path. Python
//   reads all its inputs from this file — nothing travels through argv that an attacker
//   could influence beyond a fixed, hex-only filename we generate.
function writeParamsFile(obj) {
    const p = randomTempPath('params', '.json');
    fs.writeFileSync(p, JSON.stringify(obj), 'utf8');
    return p;
}

// WHAT IT DOES: Runs the engine's Python with a safe argv array. No shell. Captures stdout
//   + stderr and mirrors them to the log file on both success and failure.
// DEPENDS-ON: CK root + venv exist; ae_processor.py is bundled next to index.html.
function runPython(args, onProgressLine) {
    const ckRoot = findCorridorkeyRoot();
    const python = findPythonExe(ckRoot);
    const processor = path.join(PANEL_DIR, 'ae_processor.py');

    if (!fs.existsSync(python)) throw new Error('Python not found: ' + python);
    if (!fs.existsSync(processor)) throw new Error('Processor not found: ' + processor);

    logLine('exec: ' + python + ' ' + args.join(' '));

    // execFileSync with arg array — no shell is invoked. windowsHide keeps the console off-screen.
    const res = childProcess.spawnSync(python, [processor].concat(args), {
        encoding: 'utf8',
        windowsHide: true,
        maxBuffer: 64 * 1024 * 1024
    });

    if (res.stdout) {
        for (const line of res.stdout.split(/\r?\n/)) {
            if (!line) continue;
            logLine('py: ' + line);
            if (onProgressLine) onProgressLine(line);
        }
    }
    if (res.stderr) {
        for (const line of res.stderr.split(/\r?\n/)) {
            if (line) logLine('py-err: ' + line, true);
        }
    }
    if (res.error) throw res.error;
    if (typeof res.status === 'number' && res.status !== 0) {
        throw new Error('Python exited with code ' + res.status);
    }
    return res;
}

// ── evalScript helper that expects JSON back ────────────────
// WHAT IT DOES: Calls a JSX function and parses its response as JSON (native, not eval).
//   The function's single string arg is wrapped with our own safe JSON escape — never eval'd.
function jsxCall(fn, args, cb) {
    const safeArgs = (args || []).map(a => {
        if (typeof a === 'number' || typeof a === 'boolean') return String(a);
        return JSON.stringify(String(a));  // native browser JSON.stringify — safely escaped
    }).join(', ');
    cs.evalScript(`${fn}(${safeArgs})`, (raw) => {
        if (!raw) return cb({ ok: false, error: 'No response from host' });
        try { cb(JSON.parse(raw)); } catch (e) { cb({ ok: false, error: 'Bad JSON: ' + raw }); }
    });
}

// ── Preview rendering ──────────────────────────────────────
function showPreview(filePath) {
    logLine('Preview: ' + filePath);
}

// ============================================================
// LIVE PREVIEW VIEWER
// ============================================================
// Persistent child process running preview_viewer.py in --persistent mode.
// Stage 1 (neural net) runs once per frame via the `cache` subcommand; sliders
// then stream JSON lines over this process's stdin to trigger stage-2 re-renders
// (~50-100ms each). The viewer owns its own Qt event loop and window.

let VIEWER_PROC = null;
let CURRENT_SESSION_DIR = null;
// Path to the extracted source frame PNG. Kept at module scope so the refiner
// re-key (stage-1 NN re-run) can reuse the same extracted frame instead of
// pulling from the video source again.
let LAST_FRAME_PNG = null;
const SLIDER_DEBOUNCE_MS = 50;
let sliderDebounceTimer = null;
let sliderPendingState = null;

// WHAT IT DOES: Finds preview_viewer.py on disk. Looks next to ae_processor.py first
//   (where install.py bundles it), then in the engine's resolve_plugin/ (legacy
//   location for the Resolve one-shot flow), then in the plugin-repo root (dev mode).
// DEPENDS-ON: PANEL_DIR constant, findCorridorkeyRoot() for the engine fallback.
// AFFECTS: returns a string path. Throws if nothing found.
function findViewerScript() {
    const candidates = [
        path.join(PANEL_DIR, 'preview_viewer.py'),
        path.resolve(PANEL_DIR, '..', '..', 'preview_viewer.py')
    ];
    try {
        const ckRoot = findCorridorkeyRoot();
        candidates.push(path.join(ckRoot, 'resolve_plugin', 'preview_viewer.py'));
    } catch (_) {}
    for (const c of candidates) {
        if (fs.existsSync(c)) return c;
    }
    throw new Error('preview_viewer.py not found. Tried:\n  ' + candidates.join('\n  '));
}

// WHAT IT DOES: Starts a persistent viewer subprocess. Keeps stdio pipes so we can
//   stream slider updates over stdin. Wires exit/error logging so panel log captures
//   viewer crashes. Does NOT call kill() — viewer self-terminates via {"cmd":"quit"}
//   on stdin end OR when its parent-PID watchdog detects the panel is gone.
// DEPENDS-ON: findViewerScript(), findPythonExe(), findCorridorkeyRoot().
// AFFECTS: sets VIEWER_PROC to the new child_process handle.
function spawnViewer(sessionDir) {
    const ckRoot = findCorridorkeyRoot();
    const python = findPythonExe(ckRoot);
    const viewer = findViewerScript();
    // -u forces unbuffered stdin/stdout on the Python side. Without it, Python
    // block-buffers stdin when it's a pipe (not a tty), so the viewer's
    // readline() won't see slider updates until ~4KB of JSON accumulates.
    // That's the single reason sliders felt "dead" on the first live build.
    const args = ['-u', viewer, '--persistent', '--session', sessionDir, '--parent-pid', String(process.pid)];
    logLine('spawn viewer: ' + args.join(' '));
    const proc = childProcess.spawn(python, args, {
        stdio: ['pipe', 'pipe', 'pipe'],
        windowsHide: false,       // viewer is a GUI window — let it show
        env: Object.assign({}, process.env, { CORRIDORKEY_ROOT: ckRoot })
    });
    proc.stdout.on('data', () => { /* viewer is quiet on stdout; ignore by design */ });
    proc.stderr.on('data', (d) => {
        const s = String(d).trim();
        if (s) logLine('viewer: ' + s, true);
    });
    proc.on('exit', (code) => {
        logLine('viewer exited (code=' + code + ')');
        if (VIEWER_PROC === proc) { VIEWER_PROC = null; CURRENT_SESSION_DIR = null; }
    });
    proc.on('error', (err) => {
        logLine('viewer spawn error: ' + err.message, true);
        if (VIEWER_PROC === proc) { VIEWER_PROC = null; CURRENT_SESSION_DIR = null; }
    });
    return proc;
}

// WHAT IT DOES: Writes one JSON object + newline to the viewer's stdin. Silently
//   drops writes if the pipe is already closed (viewer may have exited between
//   the caller's last check and now). Callers must not rely on delivery — the
//   viewer is a display; a missed slider tick is acceptable.
// DEPENDS-ON: VIEWER_PROC being set and its stdin stream being writable.
// AFFECTS: writes to a pipe. No return value.
function sendToViewer(obj) {
    // File-watcher bridge for "update" commands — the viewer polls
    // <session_dir>/live_params.json every 50ms. Atomic write (tmp + rename) so
    // the viewer never reads a half-written file. This is the reliable path;
    // stdin below is best-effort only (CEP Node pipes on Windows are flaky).
    if (obj && obj.cmd === 'update' && CURRENT_SESSION_DIR) {
        try {
            const finalPath = path.join(CURRENT_SESSION_DIR, 'live_params.json');
            const tmpPath = finalPath + '.tmp';
            fs.writeFileSync(tmpPath, JSON.stringify(obj), 'utf8');
            fs.renameSync(tmpPath, finalPath);
        } catch (e) { logLine('live_params write failed: ' + e.message, true); }
    }
    // Belt-and-suspenders: also try stdin. Harmless if it fails.
    if (!VIEWER_PROC || !VIEWER_PROC.stdin || VIEWER_PROC.stdin.destroyed) return;
    try {
        VIEWER_PROC.stdin.write(JSON.stringify(obj) + '\n');
    } catch (_) { /* broken pipe — viewer is shutting down */ }
}

// WHAT IT DOES: Sends {"cmd":"quit"} and closes stdin. The viewer exits cleanly on
//   EOF even if the quit message is dropped. We do NOT send SIGKILL — the parent-
//   PID watchdog inside the viewer is a belt-and-suspenders for the case where
//   the panel itself crashes without firing beforeunload.
// DEPENDS-ON: sendToViewer() for the quit message.
// AFFECTS: VIEWER_PROC set to null. Viewer process terminates within ~1 second.
function killViewer() {
    if (!VIEWER_PROC) return;
    try { sendToViewer({ cmd: 'quit' }); } catch (_) {}
    try { VIEWER_PROC.stdin.end(); } catch (_) {}
    VIEWER_PROC = null;
    CURRENT_SESSION_DIR = null;
}

// WHAT IT DOES: Debounced slider → viewer update. Coalesces all slider movements
//   inside a 50ms window into a single stdin write. "Drop-stale" policy — only
//   the most recent slider state is sent; no queue backup during fast drags.
// DEPENDS-ON: getSettings() for current UI values, sendToViewer() for delivery.
// AFFECTS: may write one JSON line to viewer stdin after the debounce window.
function scheduleViewerUpdate() {
    if (!VIEWER_PROC) return;
    const s = getSettings();
    sliderPendingState = {
        cmd: 'update',
        despill: s.despill,
        despeckle: s.despeckle,
        despeckleSize: s.despeckleSize,
        background: 'checker'   // Phase 4: checker only; Phase 4b adds bg UI
    };
    if (sliderDebounceTimer) return;  // timer already armed — latest state will ride it
    sliderDebounceTimer = setTimeout(() => {
        sliderDebounceTimer = null;
        const state = sliderPendingState;
        sliderPendingState = null;
        if (state && VIEWER_PROC) sendToViewer(state);
    }, SLIDER_DEBOUNCE_MS);
}

// WHAT IT DOES: Re-runs stage-1 (neural net) with current slider values against
//   the last extracted frame, overwriting fg.png + alpha.png in the active
//   session dir. Then kills and respawns the viewer so it loads the fresh PNGs.
//   Used by the refiner slider's onchange, since refiner is NN-internal and
//   can't be applied to cached output.
// DEPENDS-ON: LAST_FRAME_PNG from a prior PREVIEW FRAME click, CURRENT_SESSION_DIR,
//   VIEWER_PROC. No-op if preview isn't active.
// AFFECTS: rewrites fg.png + alpha.png in CURRENT_SESSION_DIR; kills and
//   respawns VIEWER_PROC; writes live_params.json.
let REKEY_BUSY = false;

function rekeyWithCurrentSettings() {
    if (!LAST_FRAME_PNG || !CURRENT_SESSION_DIR || !VIEWER_PROC) return;
    if (REKEY_BUSY) {
        // Drop overlapping releases — each re-key is an expensive NN pass and
        // running multiple in parallel kills the viewer mid-render.
        status('Re-key in progress, ignoring new refiner value');
        return;
    }
    REKEY_BUSY = true;
    setBusy(true);
    document.getElementById('progress-bar').classList.add('indeterminate');
    status('Re-keying with new refiner...');
    try {
        const settings = getSettings();
        const paramsPath = writeParamsFile(settings);
        // Signal viewer to show processing overlay before the NN runs.
        sendToViewer({ cmd: 'update', rekeying: true });
        runPython(['cache', LAST_FRAME_PNG, CURRENT_SESSION_DIR, '--params', paramsPath]);
        // Viewer's fg.png mtime watcher reloads Session in place and hides
        // the overlay. Also bump live_params so post-proc sliders apply.
        sendToViewer({
            cmd: 'update', rekeying: false,
            despill: settings.despill,
            despeckle: settings.despeckle,
            despeckleSize: settings.despeckleSize,
            background: 'checker'
        });
        status('Live preview active — drag sliders to re-key');
    } catch (e) {
        logLine('refiner re-key failed: ' + e.message, true);
        status('Re-key error');
    } finally {
        document.getElementById('progress-bar').classList.remove('indeterminate');
        setBusy(false);
        REKEY_BUSY = false;
    }
}

// WHAT IT DOES: Top-level handler for PREVIEW FRAME (LIVE). Extracts the current
//   frame, runs stage-1 only (cache subcommand) to write fg.png + alpha.png into
//   a fresh session directory, and spawns or reloads the persistent viewer with
//   that session. Does NOT touch the timeline — commit path is KEY CURRENT FRAME.
// DEPENDS-ON: host.jsx ppro_getFrameInfo / ae_getFrameInfo, ae_processor.py's
//   `cache` subcommand, spawnViewer().
// AFFECTS: creates %TEMP%\ck_session_<hex>\ with fg.png + alpha.png + meta.json,
//   opens a preview window. Does NOT write to the timeline.
function previewFrameLive() {
    setBusy(true);
    document.getElementById('progress-bar').classList.add('indeterminate');
    status('Keying frame...');

    const infoFn = HOST_APP === 'ppro' ? 'ppro_getFrameInfo' : 'ae_getFrameInfo';
    jsxCall(infoFn, [], (info) => {
        if (!info.ok) {
            logLine('host error: ' + info.error, true);
            document.getElementById('progress-bar').classList.remove('indeterminate');
            setBusy(false);
            flashButtonError('btn-preview', 'SELECT A LAYER');
            return;
        }
        // setTimeout gives the browser a chance to PAINT the button state change
        // before spawnSync freezes the thread. Without this, the "KEYING FRAME..."
        // button never renders because JS never yields to the paint loop.
        setTimeout(() => {
        let framePng = null;
        let sessionDir = null;
        let paramsPath = null;
        try {
            const settings = getSettings();

            // Step 1 — extract single frame. Same code path Premiere/AE use for KEY
            // CURRENT FRAME so there's zero chance of preview vs commit diverging.
            status('Extracting frame...');
            framePng = randomTempPath('extract', '.png');
            const extractArgs = (HOST_APP === 'ppro' && typeof info.sourceTimeSeconds === 'number')
                ? ['extract', info.sourceFile, framePng, '--time', String(info.sourceTimeSeconds)]
                : ['extract', info.sourceFile, framePng, '--frame', String(info.sourceFrame)];
            runPython(extractArgs);
            if (!fs.existsSync(framePng)) throw new Error('Extract produced no output');

            // Step 2 — stage-1 only. Writes fg.png + alpha.png + meta.json to session dir.
            status('Running neural key (this can take a few seconds)...');
            sessionDir = randomTempPath('session', '');
            fs.mkdirSync(sessionDir, { recursive: true });
            // Copy the extracted frame INTO the session dir. %TEMP% gets cleaned
            // aggressively by Windows, which was eating the extract PNG before
            // refiner onchange could reuse it for a re-key. Session dir lifetime
            // is ours to manage — safe to point LAST_FRAME_PNG at.
            const stableFramePng = path.join(sessionDir, 'source.png');
            fs.copyFileSync(framePng, stableFramePng);
            LAST_FRAME_PNG = stableFramePng;
            paramsPath = writeParamsFile(settings);
            runPython(['cache', framePng, sessionDir, '--params', paramsPath]);

            // Step 3 — spawn the viewer. Kill any existing viewer first so the
            // new one watches the correct session dir's live_params.json (the
            // stdin reload path was unreliable; kill+respawn is deterministic
            // and only costs ~500ms — viewer loads 2 PNGs, no torch).
            status('Opening live preview...');
            if (VIEWER_PROC) {
                try { VIEWER_PROC.kill(); } catch (_) {}
                VIEWER_PROC = null;
            }
            CURRENT_SESSION_DIR = sessionDir;
            VIEWER_PROC = spawnViewer(sessionDir);

            // Send the initial settings after a small delay so the viewer has time to
            // show its window. (A missed initial update just means the user's first
            // slider move paints the first frame — harmless.)
            setTimeout(() => {
                sendToViewer({
                    cmd: 'update',
                    despill: settings.despill,
                    despeckle: settings.despeckle,
                    despeckleSize: settings.despeckleSize,
                    background: 'checker'
                });
            }, 400);

            status('Live preview active — drag sliders to re-key');
        } catch (e) {
            logLine('fatal: ' + e.message, true);
            status('Error');
        } finally {
            // Cleanup temp inputs; session dir lives until viewer exits so a reload can re-read it.
            if (paramsPath) { try { fs.unlinkSync(paramsPath); } catch (_) {} }
            if (framePng)   { try { fs.unlinkSync(framePng); }   catch (_) {} }
            document.getElementById('progress-bar').classList.remove('indeterminate');
            setBusy(false);
        }
        }, 100);  // end setTimeout — 100ms lets browser paint before spawnSync blocks
    });
}

// ============================================================
// SINGLE-FRAME FLOW
// ============================================================
let HOST_APP = 'unknown';

function processFrame(previewOnly) {
    setBusy(true);
    status(previewOnly ? 'Extracting preview...' : 'Keying frame...');

    const infoFn = HOST_APP === 'ppro' ? 'ppro_getFrameInfo' : 'ae_getFrameInfo';
    jsxCall(infoFn, [], (info) => {
        if (!info.ok) { logLine('host error: ' + info.error, true); setBusy(false); flashButtonError('btn-process', 'SELECT A LAYER'); return; }
        try {
            const settings = getSettings();
            const framePng = randomTempPath('extract', '.png');
            const keyedPng = randomTempPath('keyed', '.png');

            // Step 1 — extract the single frame from the video. For Premiere we pass
            // --time SECONDS so Python can seek by CAP_PROP_POS_MSEC using the source's
            // native fps, avoiding the drift that happens when we convert to frames
            // using the sequence's fps. AE still uses --frame (comp fps matches source).
            const extractArgs = (HOST_APP === 'ppro' && typeof info.sourceTimeSeconds === 'number')
                ? ['extract', info.sourceFile, framePng, '--time', String(info.sourceTimeSeconds)]
                : ['extract', info.sourceFile, framePng, '--frame', String(info.sourceFrame)];
            runPython(extractArgs);
            if (!fs.existsSync(framePng)) throw new Error('Extract produced no output');

            // Step 2 — key it (params via JSON file, not argv).
            const paramsPath = writeParamsFile(settings);
            runPython(['single', framePng, keyedPng, '--params', paramsPath]);
            try { fs.unlinkSync(paramsPath); } catch (_) {}
            if (!fs.existsSync(keyedPng)) throw new Error('Keyer produced no output');

            showPreview(keyedPng);
            status('Done');
            logLine(previewOnly ? 'Preview ready' : 'Keyed, importing...');

            if (previewOnly) {
                try { fs.unlinkSync(framePng); } catch (_) {}
                setBusy(false);
                return;
            }

            // Step 3 — back to ExtendScript to import onto timeline.
            const importFn = HOST_APP === 'ppro' ? 'ppro_importFrame' : 'ae_importFrame';
            const importArgs = HOST_APP === 'ppro'
                ? [keyedPng, info.playheadSeconds, info.fps]
                : [keyedPng];
            jsxCall(importFn, importArgs, (imp) => {
                try { fs.unlinkSync(framePng); } catch (_) {}
                if (!imp.ok) { logLine('import error: ' + imp.error, true); status('Import failed'); }
                else { status('Done — placed on timeline'); logLine('Imported to timeline'); }
                setBusy(false);
            });
        } catch (e) {
            logLine('fatal: ' + e.message, true);
            status('Error');
            setBusy(false);
        }
    });
}

// ============================================================
// BATCH FLOW
// ============================================================
function processBatch() {
    setBusy(true, 'batch');
    status('Reading range...');

    const infoFn = HOST_APP === 'ppro' ? 'ppro_getInOutInfo' : 'ae_getWorkAreaInfo';
    jsxCall(infoFn, [], (info) => {
        if (!info.ok) { logLine('host error: ' + info.error, true); setBusy(false); flashButtonError('btn-batch', 'SELECT A LAYER'); return; }
        try {
            const settings = getSettings();
            const outDir = path.join(savedOutput, 'ck_batch_' + crypto.randomBytes(6).toString('hex'));
            fs.mkdirSync(outDir, { recursive: true });

            // For Premiere, pass the range in SECONDS so Python uses source-native fps
            // (no drift). For AE, pass frame numbers as before (comp fps == source fps
            // in the normal case).
            const rangeFields = (HOST_APP === 'ppro' && typeof info.startSeconds === 'number')
                ? { startSeconds: info.startSeconds, endSeconds: info.endSeconds, fps: info.fps }
                : { startFrame: info.startFrame, endFrame: info.endFrame, fps: info.fps };
            const paramsPath = writeParamsFile(Object.assign({}, settings, rangeFields));

            const approxFrames = (HOST_APP === 'ppro')
                ? Math.round((info.endSeconds - info.startSeconds) * info.fps)
                : (info.endFrame - info.startFrame);
            status('Keying ~' + approxFrames + ' frames...');

            runPython(
                ['batch', info.sourceFile, outDir, '--params', paramsPath],
                (line) => {
                    // Python emits progress lines like "PROGRESS n/m"
                    const m = line.match(/PROGRESS\s+(\d+)\/(\d+)/);
                    if (m) {
                        const pct = (parseInt(m[1], 10) / parseInt(m[2], 10)) * 100;
                        setProgress(pct);
                        status('Keyed ' + m[1] + '/' + m[2]);
                    }
                }
            );
            try { fs.unlinkSync(paramsPath); } catch (_) {}

            // Import sequence via the appropriate host hook
            const firstFrame = path.join(outDir, 'output_00000.png');
            if (!fs.existsSync(firstFrame)) throw new Error('No output frames produced');

            const importFn = HOST_APP === 'ppro' ? 'ppro_importSequence' : 'ae_importSequence';
            const importArgs = HOST_APP === 'ppro'
                ? [firstFrame, info.inPointSeconds, info.fps, info.sourceFrameRate || info.fps]
                : [firstFrame, info.fps, info.compStartTime];
            jsxCall(importFn, importArgs, (imp) => {
                if (!imp.ok) { logLine('import error: ' + imp.error, true); status('Import failed'); }
                else { status('Batch done'); logLine('Sequence imported'); }
                setBusy(false);
            });
        } catch (e) {
            logLine('fatal: ' + e.message, true);
            status('Error');
            setBusy(false);
        }
    });
}

// ============================================================
// INITIALIZE
// ============================================================
cs.evalScript('getHostApp()', (host) => {
    HOST_APP = String(host || 'unknown');
    logLine('Panel ready (' + HOST_APP + '). Log: ' + LOG_PATH);
    if (HOST_APP === 'ppro') {
        document.getElementById('btn-batch').textContent = 'PROCESS IN/OUT RANGE';
    }
    // Sanity-check engine discovery up front so the user learns about missing installs
    // BEFORE they click a button.
    try {
        const root = findCorridorkeyRoot();
        logLine('Engine: ' + root);
    } catch (e) {
        logLine('SETUP: ' + e.message, true);
        status('Engine not found — see log');
    }
    // Sanity-check the live viewer script so users find out at launch if preview_viewer.py
    // was not bundled. Non-fatal — commit path (KEY / BATCH) still works without it.
    try {
        const v = findViewerScript();
        logLine('Viewer: ' + v);
    } catch (e) {
        logLine('VIEWER: ' + e.message + ' (KEY and BATCH still work; LIVE PREVIEW disabled)', true);
    }
});

// WHAT IT DOES: When the CEP panel is closing (user hides it, restarts Adobe, or closes
//   the app), send a clean quit to the viewer and close its stdin. The viewer's parent-
//   PID watchdog is the safety net if this fires too late or not at all.
// DEPENDS-ON: killViewer().
// AFFECTS: terminates the viewer subprocess within ~1 second.
window.addEventListener('beforeunload', killViewer);
window.addEventListener('unload', killViewer);
    </script>
</body>
</html>
