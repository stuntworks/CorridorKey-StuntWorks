<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CorridorKey – Approach 6: Bioluminescent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:radial-gradient(ellipse at center,#001122 0%,#000000 100%);width:250px;overflow:hidden;
  font-family:'Segoe UI',system-ui,sans-serif;}
.ocean{position:relative;background:rgba(0,20,40,0.8);border-radius:20px;padding:24px;
  backdrop-filter:blur(10px);box-shadow:0 0 60px rgba(0,255,255,0.1),inset 0 0 20px rgba(0,200,255,0.05);
  border:1px solid rgba(0,200,255,0.2);}
.bubble{position:absolute;background:rgba(0,200,255,0.1);border-radius:50%;animation:float 8s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:0.3;}50%{transform:translateY(-20px) scale(1.2);opacity:0.1;}}
.jelly{width:100%;height:50px;background:linear-gradient(135deg,rgba(0,255,200,0.3) 0%,rgba(0,150,255,0.2) 50%,rgba(100,0,255,0.3) 100%);
  border-radius:25px;position:relative;cursor:pointer;transition:all 0.4s;overflow:hidden;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-around;}
.jelly:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,200,255,0.3);}
.jelly.active{background:linear-gradient(135deg,rgba(0,255,200,0.6) 0%,rgba(0,150,255,0.5) 50%,rgba(100,0,255,0.6) 100%);
  box-shadow:0 0 40px rgba(0,200,255,0.5);}
.jelly span{font-size:11px;font-weight:600;color:rgba(255,255,255,0.9);text-shadow:0 0 10px rgba(0,200,255,0.8);z-index:1;}
.tent-slider{margin:16px 0;}
.tent-label{font-size:10px;color:rgba(0,200,255,0.7);margin-bottom:8px;display:flex;justify-content:space-between;}
.tent-label .val{color:rgba(0,255,200,0.9);}
.tent{width:100%;height:8px;background:rgba(0,30,60,0.5);border-radius:4px;position:relative;overflow:visible;}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;background:rgba(0,30,60,0.5);border-radius:4px;outline:none;position:relative;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
  background:radial-gradient(circle,rgba(255,255,255,1) 0%,rgba(0,200,255,0.8) 100%);border-radius:50%;
  cursor:grab;box-shadow:0 0 20px rgba(0,200,255,0.6),inset 0 0 10px rgba(255,255,255,0.5);
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes shimmer{to{left:100%;}}
.plankton-row{display:flex;align-items:center;gap:12px;margin:16px 0;}
.plankton-row span{font-size:10px;color:rgba(0,200,255,0.7);}
.plankton{width:40px;height:20px;background:rgba(0,30,60,0.5);border-radius:10px;position:relative;cursor:pointer;transition:all 0.3s;}
.plankton.on{background:rgba(0,200,255,0.3);box-shadow:0 0 20px rgba(0,200,255,0.4);}
.plankton-dot{width:16px;height:16px;background:radial-gradient(circle,rgba(0,255,200,1) 0%,rgba(0,150,255,1) 100%);
  border-radius:50%;position:absolute;top:2px;left:2px;transition:transform 0.3s;box-shadow:0 0 10px rgba(0,200,255,0.8);}
.plankton.on .plankton-dot{transform:translateX(20px);}
.coral-buttons{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
.coral-btn{padding:13px;border-radius:12px;border:none;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:1px;cursor:pointer;transition:all 0.3s;font-family:inherit;}
.coral-btn:hover{transform:translateY(-2px);}
.btn-preview{background:linear-gradient(135deg,rgba(50,50,50,0.8) 0%,rgba(30,30,30,0.8) 100%);
  color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.2);}
.btn-preview:hover{border-color:rgba(0,200,255,0.5);box-shadow:0 4px 20px rgba(0,200,255,0.2);}
.btn-key{background:linear-gradient(135deg,rgba(255,150,0,0.8) 0%,rgba(255,100,0,0.8) 100%);
  color:#000;box-shadow:0 4px 20px rgba(255,150,0,0.3);}
.btn-process{background:linear-gradient(135deg,rgba(0,255,200,0.8) 0%,rgba(0,150,255,0.8) 100%);
  color:#000;box-shadow:0 4px 20px rgba(0,200,255,0.3);}
.depth{margin-top:20px;padding:12px;background:rgba(0,20,40,0.5);border-radius:8px;font-size:10px;color:rgba(0,200,255,0.6);}
.depth-log{margin-top:6px;padding:8px;background:rgba(0,10,20,0.8);border-radius:6px;font-size:9px;
  color:rgba(0,150,255,0.5);max-height:60px;overflow-y:auto;font-family:monospace;}
.tag{position:fixed;top:8px;right:8px;background:linear-gradient(135deg,rgba(0,255,200,0.9),rgba(0,150,255,0.9));
  color:#000;padding:4px 10px;border-radius:8px;font-weight:700;font-size:11px;box-shadow:0 0 20px rgba(0,200,255,0.4);}
</style>
</head>
<body>
<div class="tag">6: BIOLUMINESCENT</div>
<div class="ocean">
  <div class="bubble" style="width:20px;height:20px;top:10%;left:10%;animation-delay:0s;"></div>
  <div class="bubble" style="width:15px;height:15px;top:80%;right:15%;animation-delay:2s;"></div>
  <div class="bubble" style="width:25px;height:25px;bottom:20%;left:70%;animation-delay:4s;"></div>
  <div class="jelly active" onclick="this.classList.toggle('active')">
    <span>GREEN</span><span>BLUE</span>
  </div>
  <div class="tent-slider">
    <div class="tent-label"><span>Despill</span><span class="val" id="dv">50</span></div>
    <input type="range" min="0" max="100" value="50" oninput="document.getElementById('dv').textContent=this.value">
  </div>
  <div class="tent-slider">
    <div class="tent-label"><span>Refiner</span><span class="val" id="rv">75</span></div>
    <input type="range" min="0" max="100" value="75" oninput="document.getElementById('rv').textContent=this.value">
  </div>
  <div class="plankton-row">
    <span>Despeckle</span>
    <div class="plankton on" onclick="this.classList.toggle('on')"><div class="plankton-dot"></div></div>
  </div>
  <div class="tent-slider">
    <div class="tent-label"><span>Size</span><span class="val" id="szv">500</span></div>
    <input type="range" min="50" max="2000" value="500" oninput="document.getElementById('szv').textContent=this.value">
  </div>
  <div class="coral-buttons">
    <button class="coral-btn btn-preview">Preview Frame</button>
    <button class="coral-btn btn-key">Key Current Frame</button>
    <button class="coral-btn btn-process">Process Work Area</button>
  </div>
  <div class="depth">
    <div>STATUS: Ready</div>
    <div class="depth-log">> Corridor AI initialized<br>> Depth buffer allocated<br>> Awaiting signal...</div>
  </div>
</div>
</body>
</html>
