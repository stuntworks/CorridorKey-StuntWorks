<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CorridorKey – Approach 5: Cinema Camera</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;background:#080808;color:#00ff00;width:250px;padding:0;overflow:hidden;}
.camera-ui{background:#000;border:2px solid #222;height:100vh;display:flex;flex-direction:column;}
.header{background:linear-gradient(180deg,#1a1a1a 0%,#0a0a0a 100%);padding:8px;border-bottom:1px solid #333;
  text-align:center;font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:2px;}
.monitor{flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;}
.parameter-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.param-label{font-size:10px;color:#888;text-transform:uppercase;min-width:60px;}
.param-value{font-size:14px;color:#00ff00;font-weight:bold;min-width:40px;text-align:right;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.menu-item{background:#111;padding:10px;text-align:center;font-size:11px;border:1px solid #333;cursor:pointer;transition:all 0.2s;}
.menu-item.selected{background:#00ff00;color:#000;border-color:#00ff00;}
.menu-item:hover:not(.selected){background:#1a1a1a;border-color:#00ff00;}
.slider-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;background:#111;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border:2px solid #000;cursor:grab;}
.record-section{background:#111;border-top:2px solid #333;padding:16px;text-align:center;}
.record-button{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#ff0000 0%,#cc0000 100%);
  border:4px solid #800000;margin:0 auto 12px;display:block;cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 16px rgba(255,0,0,0.3);}
.record-button:hover{box-shadow:0 6px 24px rgba(255,0,0,0.5);}
.record-button:active{transform:scale(0.95);}
.timecode{font-size:16px;color:#00ff00;margin:8px 0;font-weight:bold;}
.status-bar{display:flex;justify-content:space-between;font-size:9px;color:#666;margin-top:4px;}
.tag{position:fixed;top:8px;right:8px;background:#00ff00;color:#000;padding:4px 10px;font-weight:700;font-size:11px;}
</style>
</head>
<body>
<div class="tag">5: CINEMA CAMERA</div>
<div class="camera-ui">
  <div class="header">CorridorKey v2.6</div>
  <div class="monitor">
    <div class="parameter-row"><div class="param-label">SCREEN</div><div class="param-value" id="sv">GREEN</div></div>
    <div class="menu-grid">
      <div class="menu-item selected" onclick="this.parentNode.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('selected'));this.classList.add('selected');document.getElementById('sv').textContent='GREEN'">GREEN</div>
      <div class="menu-item" onclick="this.parentNode.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('selected'));this.classList.add('selected');document.getElementById('sv').textContent='BLUE'">BLUE</div>
    </div>
    <div class="parameter-row"><div class="param-label">DESPILL</div><div class="param-value" id="dv">30</div></div>
    <div class="slider-row"><input type="range" min="0" max="100" value="30" oninput="document.getElementById('dv').textContent=this.value"></div>
    <div class="parameter-row"><div class="param-label">REFINE</div><div class="param-value" id="rv">60</div></div>
    <div class="slider-row"><input type="range" min="0" max="100" value="60" oninput="document.getElementById('rv').textContent=this.value"></div>
    <div class="parameter-row"><div class="param-label">DESPECKLE</div><div class="param-value">ON</div></div>
    <div class="menu-grid">
      <div class="menu-item selected">ON</div>
      <div class="menu-item">OFF</div>
    </div>
    <div class="parameter-row"><div class="param-label">SIZE</div><div class="param-value" id="szv">500</div></div>
    <div class="slider-row"><input type="range" min="50" max="2000" value="500" oninput="document.getElementById('szv').textContent=this.value"></div>
  </div>
  <div class="record-section">
    <button class="record-button"></button>
    <div class="timecode">00:00:00:00</div>
    <div class="status-bar"><span>IDLE</span><span>25fps</span><span>1920x1080</span></div>
  </div>
</div>
</body>
</html>
